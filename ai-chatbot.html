<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>Nexus AI Chatbot</h1>
        </header>
        <div class="chat-window">
            <div class="messages">
                <!-- Messages will be rendered here -->
            </div>
            <input type="text" id="user-input" placeholder="Type your message..." />
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script>
        // Initialize chat functionalities here based on API integrations
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        sendBtn.addEventListener('click', () => {
            const message = userInput.value;
            // Function to handle message sending and responses
            sendMessage(message);
            userInput.value = ''; // Clear the input box
        });

        function sendMessage(message) {
            // Placeholder for functionality to integrate with Groq and OpenAI
            console.log(`Sending message: ${message}`);
            // Add your API integration logic here
        }
    </script>
</body>
</html>
