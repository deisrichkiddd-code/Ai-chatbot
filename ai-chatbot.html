<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="chat-container">
        <h1>Welcome to AI Chatbot</h1>
        <div id="chat-window">
            <!-- Chat messages will appear here -->
        </div>
        <input type="text" id="user-input" placeholder="Type a message...">
        <button id="send-button">Send</button>
    </div>
    <script>
        // Original JavaScript functionality intact
        const sendButton = document.getElementById('send-button');
        const userInput = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        sendButton.addEventListener('click', function() {
            const userMessage = userInput.value;
            // Add message to chat window
            chatWindow.innerHTML += `<div class='user-message'>${userMessage}</div>`;
            userInput.value = '';
            // Handle AI responses
            respondToUser(userMessage);
        });

        function respondToUser(message) {
            // Simulate an AI response
            chatWindow.innerHTML += `<div class='ai-message'>AI Chatbot response to: ${message}</div>`;
        }
    </script>
</body>
</html>
